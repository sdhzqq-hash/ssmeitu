      <div class="card-body">

        <div class="card-meta">
          ${a.photographer ? `<a href="javascript:void(0)">${a.photographer}</a>` : ''}
          ${a.photographer && a.model ? '<span class="meta-sep"></span>' : ''}
          ${a.model ? `<a href="javascript:void(0)">${a.model}</a>` : ''}
        </div>
      </div>
    </div>
  `).join('');

  // Bind lightbox click
  grid.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', function(e){
      // Don't trigger lightbox if clicking on meta links
      if(e.target.closest('.card-meta a')) return;
      const a = albums.find(x => x.id == this.dataset.id);
      if(!a) return;
      document.getElementById('lightboxImg').src = a.cover;
      document.getElementById('lightboxTitle').textContent = a.title;
      document.getElementById('lightboxMeta').textContent =
        `摄影: ${a.photographer || '未知'} | 模特: ${a.model || '未知'} | ${a.count}P`;
      document.getElementById('lightbox').classList.add('active');
      document.body.style.overflow = 'hidden';
    });
  });
}

// ===== Lightbox =====
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}
document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
document.getElementById('lightbox').addEventListener('click', function(e){
  if(e.target === this) closeLightbox();
});
document.addEventListener('keydown', function(e){
  if(e.key === 'Escape') closeLightbox();
});

// ===== Nav Tabs =====
document.querySelector('.nav').addEventListener('click', function(e){
  if(!e.target.matches('button[data-tab]')) return;
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  const tab = e.target.dataset.tab;
  const ps = document.getElementById('photographerSection');
  if(tab === 'recommend'){ps.style.display='block';renderGallery();}
  else if(tab === 'siwa'){ps.style.display='none';renderSiwaGallery();}
  else{ps.style.display='none';document.getElementById('masonryGrid').innerHTML='';}
});

// ===== Siwa Gallery =====
function renderSiwaGallery(){
  const grid = document.getElementById('masonryGrid');
  const album = mimiAlbums[0];
  grid.innerHTML = album.pics.map((pic,i) => `
    <div class="card" data-id="${album.id}" data-pic="${i}">
      <div class="card-img-wrap">
        <img src="${pic}" alt="${album.title} ${i+1}" loading="lazy"
          onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22600%22><rect fill=%22%231a1a20%22 width=%22400%22 height=%22600%22/><text fill=%22%23444%22 x=%22200%22 y=%22300%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2214%22 font-family=%22sans-serif%22>加载中</text></svg>'">
        <span class="card-count">${i+1}/${album.count}</span>
      </div>
      <div class="card-body">
        <a class="card-title" href="javascript:void(0)">${album.title} · 第${i+1}张</a>
        <div class="card-meta">
          <a href="javascript:void(0)">${album.photographer}</a>
          <span class="meta-sep"></span>
          <a href="javascript:void(0)">${album.model}</a>
        </div>
      </div>
    </div>
  `).join('');

  grid.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', function(e){
      if(e.target.closest('.card-meta a')) return;
      const idx = parseInt(this.dataset.pic);
      document.getElementById('lightboxImg').src = album.pics[idx];
      document.getElementById('lightboxTitle').textContent = album.title + ' · 第'+(idx+1)+'张';
      document.getElementById('lightboxMeta').textContent = '摄影: '+album.photographer+' | 模特: '+album.model+' | '+album.count+'P';
      document.getElementById('lightbox').classList.add('active');
      document.body.style.overflow = 'hidden';
    });
  });
}

// ===== Scroll Top =====
const scrollTopBtn = document.getElementById('scrollTop');
window.addEventListener('scroll', function(){
  scrollTopBtn.classList.toggle('visible', window.scrollY > 500);
});
scrollTopBtn.addEventListener('click', function(){
  window.scrollTo({top:0,behavior:'smooth'});
});

// ===== Init =====
renderPhotographers();
renderGallery();
</script>
